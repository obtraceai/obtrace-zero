name: Security

on:
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  dependency-review:
    runs-on: obtrace-runners
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  govulncheck:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
